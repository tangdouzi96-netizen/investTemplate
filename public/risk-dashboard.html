<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>风险跟踪预警</title>
<style>
  :root {
    --bg: #0f1117;
    --sidebar-bg: #14161f;
    --card-bg: #1a1d27;
    --card-hover: #1f2233;
    --border: #2a2d3a;
    --text: #e1e4ea;
    --text-secondary: #8b8fa3;
    --text-muted: #5c6072;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.12);
    --yellow: #eab308;
    --yellow-bg: rgba(234,179,8,0.12);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.12);
    --accent: #6366f1;
    --accent-bg: rgba(99,102,241,0.15);
    --radius: 10px;
    --radius-sm: 6px;
    --sidebar-width: 220px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-width);
    min-width: var(--sidebar-width);
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 0;
  }
  .sidebar-header {
    padding: 20px 18px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 0.95rem; font-weight: 700; color: #fff;
  }
  .sidebar-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .sidebar-item {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 18px; cursor: pointer; transition: all .15s;
    border-left: 3px solid transparent;
  }
  .sidebar-item:hover { background: var(--card-hover); }
  .sidebar-item.active {
    background: var(--accent-bg);
    border-left-color: var(--accent);
  }
  .sidebar-item-icon { font-size: 1.2rem; width: 24px; text-align: center; flex-shrink: 0; }
  .sidebar-item-info { flex: 1; min-width: 0; }
  .sidebar-item-name { font-size: 0.9rem; font-weight: 600; color: #fff; }
  .sidebar-item-code { font-size: 0.7rem; color: var(--text-muted); }
  .sidebar-item-status { font-size: 0.7rem; margin-top: 2px; }
  .sidebar-footer {
    padding: 14px 18px; border-top: 1px solid var(--border);
    font-size: 0.7rem; color: var(--text-muted);
  }

  /* ── Main ── */
  .main {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }
  .main-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 28px; border-bottom: 1px solid var(--border);
  }
  .main-header-left { display: flex; align-items: center; gap: 12px; }
  .main-header-left h2 { font-size: 1.2rem; font-weight: 700; color: #fff; }
  .main-header-tags { display: flex; gap: 6px; }
  .tag {
    font-size: 0.7rem; padding: 2px 8px; border-radius: 99px;
    background: var(--accent-bg); color: var(--accent);
  }
  .main-header-right { display: flex; align-items: center; gap: 12px; }
  .last-update { font-size: 0.78rem; color: var(--text-muted); }
  .update-btn {
    background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent);
    padding: 6px 14px; border-radius: var(--radius-sm); cursor: pointer;
    font-size: 0.82rem; transition: all .2s;
  }
  .update-btn:hover { background: var(--accent); color: #fff; }
  .refresh-btn {
    background: transparent; color: var(--text-muted); border: 1px solid var(--border);
    padding: 5px 12px; border-radius: var(--radius-sm); cursor: pointer;
    font-size: 0.8rem; transition: all .2s;
  }
  .refresh-btn:hover { border-color: var(--text-secondary); color: var(--text); }

  .main-content {
    flex: 1; overflow-y: auto; padding: 24px 28px;
  }

  /* ── Status bar ── */
  .status-bar {
    display: flex; gap: 20px; margin-bottom: 20px; padding: 14px 20px;
    background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius);
  }
  .status-bar-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
  .status-bar-label { color: var(--text-muted); }
  .status-bar-value { font-weight: 600; }

  /* ── Table ── */
  .table-card {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden;
  }
  .table-card table { width: 100%; border-collapse: collapse; }
  .table-card th {
    background: rgba(255,255,255,0.03); color: var(--text-secondary);
    font-size: 0.75rem; font-weight: 500; text-align: left;
    padding: 10px 16px; border-bottom: 1px solid var(--border);
  }
  .table-card td {
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    color: var(--text); font-size: 0.85rem;
  }
  .table-card tr:last-child td { border-bottom: none; }
  .table-card tr:hover td { background: rgba(255,255,255,0.02); }
  .table-card tr.dim-sep td { border-top: 2px solid var(--accent); }
  .dim-label { color: var(--accent); font-weight: 500; font-size: 0.76rem; white-space: nowrap; }
  .val { font-family: 'JetBrains Mono', 'Consolas', 'Courier New', monospace; font-weight: 600; white-space: nowrap; }
  .thr { font-family: 'JetBrains Mono', 'Consolas', 'Courier New', monospace; color: var(--text-muted); font-size: 0.8rem; white-space: nowrap; }
  .note-cell { color: var(--text-muted); font-size: 0.73rem; }
  .empty-state { padding: 60px; text-align: center; color: var(--text-muted); font-size: 0.9rem; }
  .empty-state-icon { font-size: 3rem; margin-bottom: 12px; }

  /* ── Status dots ── */
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
  .dot-green { background: var(--green); }
  .dot-yellow { background: var(--yellow); }
  .dot-red { background: var(--red); }
  .dot-gray { background: var(--text-muted); }

  /* ── Confidence badges ── */
  .conf-badge {
    display: inline-block; font-size: 0.7rem; font-weight: 700; padding: 2px 7px;
    border-radius: 4px; text-align: center; min-width: 22px;
  }
  .conf-S { background: var(--green-bg); color: var(--green); }
  .conf-A { background: var(--green-bg); color: var(--green); }
  .conf-B { background: var(--yellow-bg); color: var(--yellow); }
  .conf-C { background: rgba(249,115,22,0.15); color: #f97316; }
  .conf-D { background: var(--red-bg); color: var(--red); }

  /* ── Trend ── */
  .trend-up { color: var(--green); }
  .trend-down { color: var(--red); }
  .trend-flat { color: var(--text-muted); }

  /* ── Modal ── */
  dialog {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); padding: 0;
    max-width: 520px; width: 90%;
  }
  dialog::backdrop { background: rgba(0,0,0,0.6); }
  .modal-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-header h3 { font-size: 1rem; color: #fff; }
  .modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 20px; }
  .modal-body .step { margin-bottom: 14px; font-size: 0.85rem; color: var(--text-secondary); line-height: 1.5; }
  .modal-body .step strong { color: var(--text); }
  .prompt-box {
    width: 100%; min-height: 60px; background: var(--bg);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); font-size: 0.8rem; padding: 12px; resize: vertical;
    font-family: 'JetBrains Mono', 'Consolas', 'Courier New', monospace;
    margin: 8px 0;
  }
  .copy-btn {
    background: var(--accent); color: #fff; border: none;
    padding: 8px 18px; border-radius: var(--radius-sm); cursor: pointer;
    font-size: 0.85rem; font-weight: 600; transition: all .2s; width: 100%;
  }
  .copy-btn:hover { opacity: 0.9; }
  .copy-btn.copied { background: var(--green); }
</style>
</head>
<body>

<!-- ════ Sidebar ════ -->
<div class="sidebar">
  <div class="sidebar-header">⚠️ 风险跟踪</div>
  <div class="sidebar-list" id="sidebarList"></div>
  <div class="sidebar-footer">数据来源：年报(S级) + 公开市场数据(B级)</div>
</div>

<!-- ════ Main ════ -->
<div class="main">
  <div class="main-header">
    <div class="main-header-left">
      <h2 id="mainTitle">选择一个公司</h2>
      <div class="main-header-tags" id="mainTags"></div>
    </div>
    <div class="main-header-right">
      <span class="last-update" id="lastUpdate">加载中…</span>
      <button class="refresh-btn" onclick="location.reload()">🔄 刷新</button>
      <button class="update-btn" id="updateBtn" style="display:none" onclick="openModal()">✏️ 更新</button>
    </div>
  </div>
  <div class="main-content" id="mainContent">
    <div class="empty-state">
      <div class="empty-state-icon">👈</div>
      <div>从左侧选择一家公司查看风险跟踪指标</div>
    </div>
  </div>
</div>

<!-- ════ Modal ════ -->
<dialog id="updateModal">
  <div class="modal-header">
    <h3>✏️ 更新风险指标</h3>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-body">
    <div class="step"><strong>📋 第1步</strong>：复制下方指令</div>
    <textarea class="prompt-box" id="promptBox" readonly></textarea>
    <button class="copy-btn" id="copyBtn" onclick="copyCmd()">📋 复制指令</button>
    <div class="step" style="margin-top:16px;"><strong>📄 第2步</strong>：将指令粘贴到Claude对话中，并附上最新财报PDF文件</div>
  </div>
</dialog>

<script>
const DATA_URL = 'risk-data.json';
let riskData = null;
let activeCompany = null;

async function loadData() {
  try {
    const resp = await fetch(DATA_URL);
    riskData = await resp.json();
    document.getElementById('lastUpdate').textContent = '最后更新：' + riskData.lastUpdated;
    renderSidebar();
    // auto-select first company
    const first = Object.keys(riskData.companies)[0];
    if (first) selectCompany(first);
  } catch (e) {
    document.getElementById('lastUpdate').textContent = '数据加载失败';
  }
}

function renderSidebar() {
  const list = document.getElementById('sidebarList');
  list.innerHTML = '';
  const icons = { '泸州老窖': '🍶', '泡泡玛特': '🧸', '陕西煤业': '⛏️' };

  for (const [name, c] of Object.entries(riskData.companies)) {
    let statusColor, statusText;
    if (c.status === 'normal') { statusColor = 'var(--green)'; statusText = '🟢 正常'; }
    else if (c.status === 'warning') { statusColor = 'var(--yellow)'; statusText = '🟡 关注'; }
    else { statusColor = 'var(--red)'; statusText = '🔴 预警'; }

    const redCount = c.indicators.filter(i => i.status === 'red').length;
    const yellowCount = c.indicators.filter(i => i.status === 'yellow').length;
    let warnInfo = '';
    if (redCount > 0) warnInfo = `${redCount}🔴 `;
    if (yellowCount > 0) warnInfo += `${yellowCount}🟡`;
    if (!warnInfo) warnInfo = '0预警';

    const div = document.createElement('div');
    div.className = 'sidebar-item';
    div.onclick = () => selectCompany(name);
    div.innerHTML = `
      <span class="sidebar-item-icon">${icons[name] || '📊'}</span>
      <div class="sidebar-item-info">
        <div class="sidebar-item-name">${name}</div>
        <div class="sidebar-item-code">${c.code}</div>
        <div class="sidebar-item-status" style="color:${statusColor}">${statusText} · ${warnInfo}</div>
      </div>`;
    list.appendChild(div);
  }
}

function selectCompany(name) {
  activeCompany = name;
  const c = riskData.companies[name];

  // highlight sidebar
  document.querySelectorAll('.sidebar-item').forEach((el, i) => {
    const companyName = Object.keys(riskData.companies)[i];
    el.classList.toggle('active', companyName === name);
  });

  // header
  document.getElementById('mainTitle').textContent = name;
  document.getElementById('mainTags').innerHTML = `
    <span class="tag">${c.code}</span>
    <span class="tag">${c.industry}</span>
    <span class="tag">${c.assetType}</span>
    <span class="tag">FCF/NP ${c.fcfThreshold}</span>`;
  document.getElementById('updateBtn').style.display = '';

  // status bar
  const redCount = c.indicators.filter(i => i.status === 'red').length;
  const yellowCount = c.indicators.filter(i => i.status === 'yellow').length;
  const unknownCount = c.indicators.filter(i => i.status === 'unknown').length;
  let statusText, statusColor;
  if (c.status === 'normal') { statusText = '🟢 正常'; statusColor = 'var(--green)'; }
  else if (c.status === 'warning') { statusText = '🟡 关注'; statusColor = 'var(--yellow)'; }
  else { statusText = '🔴 预警'; statusColor = 'var(--red)'; }

  // table
  let rows = '';
  c.indicators.forEach(ind => {
    let dotClass = 'dot-gray';
    if (ind.status === 'green') dotClass = 'dot-green';
    else if (ind.status === 'yellow') dotClass = 'dot-yellow';
    else if (ind.status === 'red') dotClass = 'dot-red';

    let trendHtml = '<span class="trend-flat">—</span>';
    if (ind.trend === '↑') trendHtml = '<span class="trend-up">↑</span>';
    else if (ind.trend === '↓') trendHtml = '<span class="trend-down">↓</span>';
    else if (ind.trend === '→') trendHtml = '<span class="trend-flat">→</span>';

    const isIndustry = ind.dim.startsWith('🔍');
    const dimClass = isIndustry ? 'dim-sep' : '';

    const conf = ind.confidence || 'D';
    const confTitle = {S:'年报PDF原文 → 可全额建仓', A:'官网/业绩公告 → 可正常分析', B:'第三方平台 → 需与S级交叉验证', C:'研报/业内估算 → 仅供参考', D:'AI估算/无数据 → 禁止用于投资决策'}[conf] || '';
    rows += `
      <tr class="${dimClass}">
        <td class="dim-label">${ind.dim}</td>
        <td>${ind.name}</td>
        <td class="val"><span class="dot ${dotClass}"></span>${ind.value}</td>
        <td class="thr">${ind.threshold}</td>
        <td>${trendHtml}</td>
        <td style="text-align:center"><span class="conf-badge conf-${conf}" title="${confTitle}">${conf}</span></td>
        <td class="note-cell">${ind.note}</td>
      </tr>`;
  });

  document.getElementById('mainContent').innerHTML = `
    <div class="status-bar">
      <div class="status-bar-item"><span class="status-bar-label">状态</span><span class="status-bar-value" style="color:${statusColor}">${statusText}</span></div>
      <div class="status-bar-item"><span class="status-bar-label">🔴 预警</span><span class="status-bar-value" style="color:var(--red)">${redCount}</span></div>
      <div class="status-bar-item"><span class="status-bar-label">🟡 关注</span><span class="status-bar-value" style="color:var(--yellow)">${yellowCount}</span></div>
      <div class="status-bar-item"><span class="status-bar-label">⬜ 待更新</span><span class="status-bar-value" style="color:var(--text-muted)">${unknownCount}</span></div>
    </div>
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th style="width:110px">维度</th>
            <th style="width:140px">指标</th>
            <th style="width:140px">当前值</th>
            <th style="width:110px">阈值</th>
            <th style="width:40px">趋势</th>
            <th style="width:55px">置信度</th>
            <th>备注</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ── Modal ──
function openModal() {
  if (!activeCompany) return;
  const c = riskData.companies[activeCompany];
  document.getElementById('promptBox').value = `更新${activeCompany}风险跟踪指标`;
  document.getElementById('copyBtn').textContent = '📋 复制指令';
  document.getElementById('copyBtn').classList.remove('copied');
  document.getElementById('updateModal').showModal();
}

function closeModal() { document.getElementById('updateModal').close(); }

function copyCmd() {
  const box = document.getElementById('promptBox');
  box.select(); document.execCommand('copy');
  const btn = document.getElementById('copyBtn');
  btn.textContent = '✅ 已复制！粘贴到Claude并附上财报PDF';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = '📋 复制指令'; btn.classList.remove('copied'); }, 3000);
}

document.addEventListener('DOMContentLoaded', loadData);
document.getElementById('updateModal').addEventListener('click', e => {
  if (e.target === document.getElementById('updateModal')) closeModal();
});
</script>
</body>
</html>
